{{ define "main" }}
<div class="container">
    <h1>{{ .Params.title }}</h1>
    <div class="post-meta">
        <span class="post-date">{{ .Date.Format "2006-01-02" }}</span>
        {{ with .Params.maturity }}
        &nbsp;&middot;&nbsp;<span class="maturity-badge" data-maturity="{{ . }}">{{ . }}</span>
        {{ end }}
    </div>

    {{ with .Params.updates }}
    <div class="post-history">
        <div class="post-history-label">change history</div>
        {{ range . }}
        <div class="history-entry">
            <span class="history-date">{{ .date }}</span> &mdash; {{ .note }}
        </div>
        {{ end }}
    </div>
    {{ end }}

    <hr />
    {{ .Content }}
</div>
{{ end }}
